<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="FoodFat scanner leaf logo">
  <defs>
    <linearGradient id="leafGrad01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B8A3A"/>
      <stop offset="100%" stop-color="#0F5F25"/>
    </linearGradient>
  </defs>
  <!-- Leaf body -->
  <path d="M40 160 C 40 80, 80 40, 160 40 C 160 120, 120 160, 40 160 Z"
        fill="url(#leafGrad01)"/>
  <!-- Leaf vein -->
  <path d="M40 160 L 160 40" stroke="#F4F1E8" stroke-width="3" stroke-linecap="round"/>
  <!-- Scan bars cut into leaf -->
  <g fill="#F4F1E8">
    <rect x="60" y="90"  width="3" height="50"/>
    <rect x="68" y="80"  width="5" height="60"/>
    <rect x="78" y="85"  width="3" height="55"/>
    <rect x="85" y="75"  width="6" height="65"/>
    <rect x="95" y="80"  width="3" height="60"/>
    <rect x="102" y="70" width="5" height="70"/>
    <rect x="112" y="78" width="3" height="62"/>
  </g>
  <!-- Scan beam -->
  <line x1="55" y1="105" x2="125" y2="105" stroke="#F6A609" stroke-width="3" stroke-linecap="round"/>
</svg>
