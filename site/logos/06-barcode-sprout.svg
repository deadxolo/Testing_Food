<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="FoodFat barcode sprout logo">
  <!-- Square paper background -->
  <rect x="10" y="10" width="180" height="180" rx="20" fill="#F4F1E8"/>
  <rect x="10" y="10" width="180" height="180" rx="20" fill="none" stroke="#1A1F1A" stroke-width="2"/>
  <!-- Barcode -->
  <g fill="#1A1F1A">
    <rect x="40"  y="80" width="4"  height="90"/>
    <rect x="50"  y="80" width="2"  height="90"/>
    <rect x="56"  y="80" width="6"  height="90"/>
    <rect x="68"  y="80" width="3"  height="90"/>
    <rect x="76"  y="80" width="5"  height="90"/>
    <rect x="86"  y="80" width="2"  height="90"/>
    <rect x="92"  y="80" width="4"  height="90"/>
    <rect x="100" y="80" width="6"  height="90"/>
    <rect x="110" y="80" width="3"  height="90"/>
    <rect x="118" y="80" width="5"  height="90"/>
    <rect x="128" y="80" width="2"  height="90"/>
    <rect x="134" y="80" width="4"  height="90"/>
    <rect x="142" y="80" width="3"  height="90"/>
    <rect x="150" y="80" width="6"  height="90"/>
    <rect x="160" y="80" width="2"  height="90"/>
  </g>
  <!-- Sprout growing from the middle bar -->
  <g>
    <path d="M103 80 C 103 60, 95 50, 80 45" stroke="#1B8A3A" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M85 50 C 70 40, 55 45, 60 60 C 75 60, 85 55, 85 50 Z" fill="#1B8A3A"/>
    <path d="M100 60 C 115 45, 130 50, 130 65 C 115 70, 100 65, 100 60 Z" fill="#7CB342"/>
  </g>
  <!-- Small numbers under barcode -->
  <text x="100" y="180" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1A1F1A" letter-spacing="2">8 901234 567890</text>
</svg>
