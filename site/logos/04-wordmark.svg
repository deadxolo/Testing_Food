<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="FoodFat wordmark logo">
  <!-- Magazine-style wordmark -->
  <!-- Top rule -->
  <line x1="20" y1="32" x2="460" y2="32" stroke="#1A1F1A" stroke-width="2"/>
  <line x1="20" y1="38" x2="460" y2="38" stroke="#1A1F1A" stroke-width="1"/>
  <!-- Kicker -->
  <text x="240" y="58" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" letter-spacing="3" fill="#5A625A" font-weight="700">VOL. I  ·  AN INDEPENDENT REVIEW</text>
  <!-- Wordmark -->
  <text x="240" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="62" font-weight="900" font-style="italic" fill="#1A1F1A" letter-spacing="-3">FoodFat</text>
  <!-- Subtitle in seed -->
  <text x="240" y="155" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" letter-spacing="10" fill="#1B8A3A" font-weight="600">R  E  V  I  E  W</text>
  <!-- Bottom rule -->
