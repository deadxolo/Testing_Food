<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="FoodFat score gauge logo">
  <!-- Circular badge echoing the in-app gauge -->
  <circle cx="100" cy="100" r="90" fill="#1A1F1A"/>
  <!-- Gauge track -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#3A3F3A" stroke-width="10"/>
  <!-- Gauge value -->
  <circle cx="100" cy="100" r="70"
          fill="none"
          stroke="#1B8A3A"
          stroke-width="10"
          stroke-linecap="round"
          stroke-dasharray="440"
          stroke-dashoffset="100"
          transform="rotate(-90 100 100)"/>
  <!-- FF monogram center -->
  <text x="100" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-weight="900" font-style="italic" fill="#F4F1E8" letter-spacing="-3">ff</text>
  <!-- Small leaf accent -->
  <path d="M138 60 C 148 50, 158 52, 158 62 C 150 65, 142 65, 138 60 Z" fill="#7CB342"/>
</svg>
